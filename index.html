<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Landing Page - Enzo Fahrezi</title>

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Google Font: Press Start 2P + Space Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0ebe3;
            padding: 16px;
            background-image:
                linear-gradient(rgba(180, 160, 140, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(180, 160, 140, 0.08) 1px, transparent 1px);
            background-size: 20px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== FLOATING PIXEL ELEMENTS ===== */
        .floating-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .pixel-float {
            position: absolute;
            width: 20px;
            height: 20px;
            image-rendering: pixelated;
            opacity: 0.6;
            animation: floatAround linear infinite;
        }

        /* bentuk pixel dengan clip-path */
        .pixel-float.star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            background: #ff6b6b;
            width: 24px;
            height: 24px;
        }
        .pixel-float.square {
            background: #4ecdc4;
            width: 18px;
            height: 18px;
            border: 2px solid #4a3a2a;
        }
        .pixel-float.diamond {
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            background: #ffd93d;
            width: 22px;
            height: 22px;
        }
        .pixel-float.circle {
            border-radius: 50%;
            background: #a29bfe;
            width: 16px;
            height: 16px;
            border: 2px solid #4a3a2a;
        }
        .pixel-float.triangle {
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            background: #ff8a80;
            width: 20px;
            height: 20px;
        }
        .pixel-float.plus {
            background: #81ecec;
            width: 16px;
            height: 16px;
            clip-path: polygon(40% 0%, 60% 0%, 60% 40%, 100% 40%, 100% 60%, 60% 60%, 60% 100%, 40% 100%, 40% 60%, 0% 60%, 0% 40%, 40% 40%);
        }

        @keyframes floatAround {
            0% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 0.3;
            }
            25% {
                opacity: 0.7;
            }
            50% {
                transform: translate(30px, -40px) rotate(180deg) scale(1.1);
                opacity: 0.5;
            }
            75% {
                opacity: 0.8;
            }
            100% {
                transform: translate(-20px, 20px) rotate(360deg) scale(0.9);
                opacity: 0.3;
            }
        }

        /* variasi posisi dan durasi */
        .pixel-float:nth-child(1) {
            top: 8%;
            left: 5%;
            animation-duration: 12s;
            animation-delay: 0s;
        }
        .pixel-float:nth-child(2) {
            top: 15%;
            right: 6%;
            animation-duration: 14s;
            animation-delay: 1s;
        }
        .pixel-float:nth-child(3) {
            bottom: 20%;
            left: 4%;
            animation-duration: 11s;
            animation-delay: 2s;
        }
        .pixel-float:nth-child(4) {
            bottom: 10%;
            right: 5%;
            animation-duration: 16s;
            animation-delay: 0.5s;
        }
        .pixel-float:nth-child(5) {
            top: 45%;
            left: 2%;
            animation-duration: 13s;
            animation-delay: 1.5s;
        }
        .pixel-float:nth-child(6) {
            top: 50%;
            right: 3%;
            animation-duration: 15s;
            animation-delay: 0.8s;
        }
        .pixel-float:nth-child(7) {
            top: 5%;
            left: 50%;
            animation-duration: 18s;
            animation-delay: 2.2s;
        }
        .pixel-float:nth-child(8) {
            bottom: 5%;
            left: 45%;
            animation-duration: 12s;
            animation-delay: 1.2s;
        }
        .pixel-float:nth-child(9) {
            top: 30%;
            left: 8%;
            animation-duration: 10s;
            animation-delay: 0.3s;
        }
        .pixel-float:nth-child(10) {
            bottom: 40%;
            right: 8%;
            animation-duration: 14s;
            animation-delay: 1.8s;
        }
        .pixel-float:nth-child(11) {
            top: 70%;
            left: 3%;
            animation-duration: 17s;
            animation-delay: 0.7s;
        }
        .pixel-float:nth-child(12) {
            top: 20%;
            right: 12%;
            animation-duration: 13s;
            animation-delay: 2.5s;
        }

        /* ===== CARD UTAMA ===== */
        .card {
            max-width: 440px;
            width: 100%;
            background: #fcf8f2;
            border: 4px solid #4a3a2a;
            border-radius: 0;
            padding: 24px 18px 22px;
            box-shadow: 8px 8px 0 #4a3a2a, 0 0 0 2px #f0ebe3, 0 0 0 6px #4a3a2a;
            position: relative;
            z-index: 1;
            transition: transform 0.1s ease;
            animation: cardIn 0.6s steps(2) forwards;
            opacity: 0;
            transform: translateY(16px);
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== HEADER: Avatar + Nama ===== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            border-bottom: 4px solid #4a3a2a;
            padding-bottom: 14px;
        }

        .avatar-wrapper {
            flex-shrink: 0;
            animation: floatY 3s ease-in-out infinite;
        }

        @keyframes floatY {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        .avatar {
            width: 76px;
            height: 76px;
            background: #e8dccc;
            border: 4px solid #4a3a2a;
            padding: 2px;
            image-rendering: pixelated;
            transition: transform 0.15s ease;
        }

        .avatar:hover {
            transform: scale(1.02);
        }

        .avatar .fallback {
            width: 100%;
            height: 100%;
            background: #d4c4b0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 28px;
            color: #4a3a2a;
            text-shadow: 2px 2px 0 #f0ebe3;
            border: 2px solid #4a3a2a;
        }

        .profile-info {
            flex: 1;
        }

        .name {
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            letter-spacing: 1px;
            color: #4a3a2a;
            text-shadow: 2px 2px 0 #e8dccc;
            line-height: 1.2;
            margin-bottom: 2px;
        }

        .subtitle {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: #6b5a4a;
            background: #e8dccc;
            padding: 4px 12px;
            display: inline-block;
            border: 2px solid #4a3a2a;
            letter-spacing: 0.3px;
        }

        .subtitle i {
            margin-right: 4px;
        }

        /* ===== DIVIDER ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 14px 0 16px;
        }

        .divider-line {
            flex: 1;
            height: 3px;
            background: #4a3a2a;
            border-bottom: 2px solid #f0ebe3;
        }

        .divider-dot {
            width: 12px;
            height: 12px;
            background: #4a3a2a;
            border: 2px solid #f0ebe3;
            flex-shrink: 0;
            animation: pulseDot 1.8s steps(2) infinite;
        }

        @keyframes pulseDot {
            0%,
            100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        /* ===== SECTION LABEL ===== */
        .section-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #4a3a2a;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 3px solid #4a3a2a;
            padding-bottom: 6px;
            text-shadow: 1px 1px 0 #e8dccc;
        }

        .section-label i {
            font-size: 14px;
        }

        /* ===== ITEMS (Portofolio) ===== */
        .items {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 8px 0 14px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border: 3px solid #4a3a2a;
            text-decoration: none;
            color: #4a3a2a;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.12s ease;
            cursor: pointer;
            opacity: 0;
            transform: translateY(8px);
            animation: itemIn 0.4s steps(2) forwards;
        }

        .item:nth-child(1) {
            animation-delay: 0.05s;
            background: #f5efe8;
        }
        .item:nth-child(2) {
            animation-delay: 0.10s;
            background: #f0e8e0;
        }
        .item:nth-child(3) {
            animation-delay: 0.15s;
            background: #f5e8dc;
        }
        .item:nth-child(4) {
            animation-delay: 0.20s;
            background: #e8f0e8;
        }
        .item:nth-child(5) {
            animation-delay: 0.25s;
            background: #ece8f0;
        }
        .item:nth-child(6) {
            animation-delay: 0.30s;
            background: #f5f0e0;
        }

        @keyframes itemIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .item:hover {
            filter: brightness(0.96);
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #4a3a2a;
        }

        .item:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .item-icon {
            width: 32px;
            height: 32px;
            background: rgba(74, 58, 42, 0.08);
            border: 2px solid #4a3a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #4a3a2a;
            flex-shrink: 0;
        }

        .item-text {
            flex: 1;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }

        .item-tag {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            text-transform: uppercase;
            padding: 2px 8px;
            background: rgba(74, 58, 42, 0.1);
            border: 2px solid #4a3a2a;
            color: #4a3a2a;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .item-arrow {
            font-size: 14px;
            color: #4a3a2a;
            opacity: 0.5;
            transition: opacity 0.15s ease, transform 0.15s ease;
        }

        .item:hover .item-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* ===== NOTIFICATIONS ===== */
        .notif-section {
            margin: 14px 0 12px;
        }

        .notif-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .notif {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border: 3px solid #4a3a2a;
            border-left-width: 8px;
            font-size: 12px;
            font-family: 'Space Mono', monospace;
            color: #4a3a2a;
            font-weight: 700;
            transition: background 0.12s ease;
            cursor: default;
        }

        .notif:hover {
            filter: brightness(0.96);
        }

        .notif i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            color: #4a3a2a;
        }

        .notif.success {
            background: #e8f0e8;
            border-left-color: #4a7a5a;
        }
        .notif.warning {
            background: #f5f0dc;
            border-left-color: #b88a3a;
        }
        .notif.error {
            background: #f5e8e4;
            border-left-color: #b85a4a;
        }
        .notif.complete {
            background: #ece8f0;
            border-left-color: #7a5a8a;
        }

        .notif .msg {
            flex: 1;
        }

        .notif .badge {
            font-family: 'Press Start 2P', monospace;
            font-size: 8px;
            text-transform: uppercase;
            padding: 2px 8px;
            background: rgba(74, 58, 42, 0.08);
            border: 2px solid #4a3a2a;
            color: #4a3a2a;
        }

        /* ===== SOSIAL MEDIA ===== */
        .social-section {
            margin-top: 4px;
        }

        .social-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0 14px;
        }

        .social-divider .divider-line {
            background: #4a3a2a;
            height: 3px;
            border-bottom: 2px solid #f0ebe3;
        }

        .social-label {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #4a3a2a;
            letter-spacing: 1px;
            flex-shrink: 0;
            text-shadow: 1px 1px 0 #e8dccc;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 14px 6px 10px;
            background: #f5efe8;
            border: 3px solid #4a3a2a;
            color: #4a3a2a;
            transition: all 0.12s ease;
            opacity: 0;
            transform: translateY(6px);
            animation: socialIn 0.4s steps(2) forwards;
        }

        .social-link:nth-child(1) {
            animation-delay: 0.35s;
            background: #f0e8e0;
        }
        .social-link:nth-child(2) {
            animation-delay: 0.40s;
            background: #ece8f0;
        }

        @keyframes socialIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .social-link:hover {
            filter: brightness(0.96);
            transform: translateY(-2px);
            box-shadow: 0 3px 0 #4a3a2a;
        }

        .social-link:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        .social-link i {
            font-size: 18px;
            width: 22px;
            text-align: center;
        }

        .social-link .ig {
            color: #b85a7a;
        }
        .social-link .tt {
            color: #4a3a2a;
        }

        .social-link span {
            font-weight: 700;
        }

        /* ===== MUSIC CONTROL ===== */
        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            background: #fcf8f2;
            border: 3px solid #4a3a2a;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #4a3a2a;
            transition: all 0.15s ease;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: #4a3a2a;
        }

        .music-control:hover {
            transform: translateY(-2px);
            box-shadow: 6px 6px 0 #4a3a2a;
        }

        .music-control:active {
            transform: translateY(2px);
            box-shadow: 2px 2px 0 #4a3a2a;
        }

        .music-control i {
            font-size: 18px;
        }

        .music-control .status {
            font-size: 8px;
            letter-spacing: 0.5px;
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            margin-top: 18px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            color: #6b5a4a;
            border-top: 3px solid #4a3a2a;
            padding-top: 12px;
            letter-spacing: 0.5px;
        }

        .footer span {
            display: inline-block;
            animation: shimmer 3s steps(2) infinite;
        }

        @keyframes shimmer {
            0%,
            100% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .card {
                padding: 18px 12px 16px;
                box-shadow: 6px 6px 0 #4a3a2a, 0 0 0 2px #f0ebe3, 0 0 0 4px #4a3a2a;
            }
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 8px;
            }
            .avatar {
                width: 68px;
                height: 68px;
            }
            .avatar .fallback {
                font-size: 24px;
            }
            .name {
                font-size: 16px;
            }
            .subtitle {
                font-size: 10px;
            }
            .item {
                padding: 8px 12px;
                font-size: 12px;
                gap: 10px;
            }
            .item-icon {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .item-tag {
                font-size: 7px;
                padding: 1px 6px;
            }
            .notif {
                font-size: 11px;
                padding: 6px 10px;
            }
            .notif .badge {
                font-size: 7px;
                padding: 1px 6px;
            }
            .social-link {
                font-size: 11px;
                padding: 4px 10px 4px 8px;
            }
            .social-link i {
                font-size: 16px;
                width: 18px;
            }
            .music-control {
                bottom: 12px;
                right: 12px;
                padding: 8px 12px;
                font-size: 8px;
            }
            .music-control i {
                font-size: 14px;
            }
            .pixel-float {
                transform: scale(0.7);
            }
        }

        @media (max-width: 380px) {
            .item {
                font-size: 11px;
                padding: 6px 10px;
            }
            .item-icon {
                width: 24px;
                height: 24px;
                font-size: 11px;
            }
            .item-tag {
                display: none;
            }
            .notif .badge {
                display: none;
            }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            background: #f0ebe3;
        }
        ::-webkit-scrollbar-thumb {
            background: #4a3a2a;
            border: 2px solid #f0ebe3;
        }
    </style>
</head>

    <!-- ===== SCRIPT ===== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // ===== INTERAKSI ITEM =====
            const items = document.querySelectorAll('.item');
            items.forEach(item => {
                item.addEventListener('click', function(e) {
                    if (this.getAttribute('href') === '#') {
                        e.preventDefault();
                        this.style.transform = 'scale(0.95)';
                        setTimeout(() => {
                            this.style.transform = '';
                        }, 100);
                    }
                });
            });

            // ===== INTERAKSI SOSIAL =====
            const socials = document.querySelectorAll('.social-link');
            socials.forEach(link => {
                link.addEventListener('mouseenter', function() {
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.style.transition = 'transform 0.1s ease';
                        icon.style.transform = 'scale(1.1)';
                    }
                });
                link.addEventListener('mouseleave', function() {
                    const icon = this.querySelector('i');
                    if (icon) {
                        icon.style.transform = 'scale(1)';
                    }
                });
            });

            // ===== MUSIC ARCADE LOOPING (Web Audio API) =====
            let audioCtx = null;
            let isPlaying = false;
            let intervalId = null;
            let gainNode = null;

            const musicControl = document.getElementById('musicControl');
            const musicIcon = document.getElementById('musicIcon');
            const musicStatus = document.getElementById('musicStatus');

            // Fungsi untuk memainkan nada arcade
            function playArcadeNote(frequency, duration, volume = 0.15) {
                if (!audioCtx) return;
                try {
                    const oscillator = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();

                    oscillator.type = 'square'; // suara pixel/retro
                    oscillator.frequency.value = frequency;

                    gain.gain.value = volume;
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                    oscillator.connect(gain);
                    gain.connect(gainNode ? gainNode : audioCtx.destination);

                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + duration);
                } catch (e) {
                    // silent fail
                }
            }

            // Melodi arcade sederhana (looping)
            function playArcadeMelody() {
                if (!isPlaying) return;

                const notes = [
                    { freq: 523, dur: 0.12 }, // C5
                    { freq: 659, dur: 0.12 }, // E5
                    { freq: 784, dur: 0.15 }, // G5
                    { freq: 880, dur: 0.12 }, // A5
                    { freq: 784, dur: 0.12 }, // G5
                    { freq: 659, dur: 0.15 }, // E5
                    { freq: 523, dur: 0.18 }, // C5
                    { freq: 392, dur: 0.12 }, // G4
                    { freq: 523, dur: 0.12 }, // C5
                    { freq: 659, dur: 0.18 }, // E5
                ];

                let time = 0;
                const startTime = audioCtx.currentTime;

                notes.forEach((note, index) => {
                    const delay = time;
                    setTimeout(() => {
                        if (isPlaying) {
                            playArcadeNote(note.freq, note.dur, 0.10);
                        }
                    }, delay * 1000);
                    time += note.dur + 0.04;
                });

                // Ulang setelah selesai
                const totalDuration = time + 0.3;
                clearInterval(intervalId);
                intervalId = setInterval(() => {
                    if (isPlaying) {
                        playArcadeMelody();
                    }
                }, totalDuration * 1000);
            }

            // Start audio
            function startAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.3;
                    gainNode.connect(audioCtx.destination);
                }

                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                isPlaying = true;
                musicIcon.className = 'fas fa-pause';
                musicStatus.textContent = 'PAUSE';
                playArcadeMelody();
            }

            // Stop audio
            function stopAudio() {
                isPlaying = false;
                clearInterval(intervalId);
                musicIcon.className = 'fas fa-play';
                musicStatus.textContent = 'PLAY';
                if (audioCtx && audioCtx.state === 'running') {
                    audioCtx.suspend();
                }
            }

            // Toggle musik
            musicControl.addEventListener('click', () => {
                if (isPlaying) {
                    stopAudio();
                } else {
                    startAudio();
                }
            });

            // Auto-play saat user berinteraksi (karena kebijakan browser)
            document.addEventListener('click', () => {
                if (!audioCtx && !isPlaying) {
                    // inisialisasi tapi belum play
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                    gainNode = audioCtx.createGain();
                    gainNode.gain.value = 0.3;
                    gainNode.connect(audioCtx.destination);
                }
            }, { once: true });

            // ===== FLOATING ELEMENTS EXTRA: variasi gerakan =====
            // Tambahkan efek floating yang lebih dinamis dengan JS (opsional)
            const floats = document.querySelectorAll('.pixel-float');
            floats.forEach((el, index) => {
                const speed = 0.5 + Math.random() * 0.8;
                const xOffset = (Math.random() - 0.5) * 60;
                const yOffset = (Math.random() - 0.5) * 60;
                el.style.setProperty('--x', xOffset + 'px');
                el.style.setProperty('--y', yOffset + 'px');
                // animasi sudah di CSS, kita hanya tambahkan variasi
            });

        });
    </script>
